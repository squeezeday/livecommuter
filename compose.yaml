# ========================================
# Docker Compose Configuration
# Modern Node.js Todo Application
# ========================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: livecommuter-prod
    ports:
      - '${PORT:-8080}:3000'
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-https://yourdomain.com}'
      SAMTRAFIKEN_API_KEY: '${SAMTRAFIKEN_API_KEY}'
      SAMTRAFIKEN_API_URL: '${SAMTRAFIKEN_API_URL}'
      AGENCIES: '${AGENCIES}'
      VITE_REFRESH_INTERVAL: '${VITE_REFRESH_INTERVAL}'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${PROD_MEMORY_LIMIT:-2G}'
          cpus: '${PROD_CPU_LIMIT:-1.0}'
        reservations:
          memory: '${PROD_MEMORY_RESERVATION:-512M}'
          cpus: '${PROD_CPU_RESERVATION:-0.25}'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/app/data:ro
